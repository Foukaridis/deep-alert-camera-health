services:
  db:
    image: murrayinglis/da-tech-test-db:latest

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: murrayinglis/da-tech-test:latest

    environment:
      PORT: 8080
    ports:
      - "8080:8080"
      - "8554:8554"
    depends_on:
      db:
        condition: service_healthy

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085
    ports:
      - "8085:8085"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8085/v1/projects/deepalert-local/topics" ]
      interval: 5s
      timeout: 5s
      retries: 20

  pubsub-init:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    depends_on:
      pubsub-emulator:
        condition: service_healthy
    environment:
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      GCP_PROJECT_ID: deepalert-local
      PUBSUB_TOPIC: camera-health-events
      PUBSUB_SUBSCRIPTION: camera-health-events-sub
    volumes:
      - ./scripts:/scripts
    entrypoint: [ "bash", "/scripts/pubsub-init.sh" ]

  camera-probe:
    build:
      context: ./services/camera-probe
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      GCP_PROJECT_ID: deepalert-local
      PUBSUB_TOPIC: camera-health-events
      PROBE_INTERVAL_SECONDS: "60"
      RTSP_TIMEOUT_SECONDS: "5"
      PROBE_CONCURRENCY: "10"
      API_HOST: "api"
    depends_on:
      db:
        condition: service_healthy
      pubsub-init:
        condition: service_completed_successfully
    restart: unless-stopped

  camera-consumer:
    build:
      context: ./services/camera-consumer
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      GCP_PROJECT_ID: deepalert-local
      PUBSUB_TOPIC: camera-health-events
      PUBSUB_SUBSCRIPTION: camera-health-events-sub
    depends_on:
      db:
        condition: service_healthy
      pubsub-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  db-data:
