version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: bluenviron/mediamtx:latest-ffmpeg
    ports:
      - "8554:8554"
      - "8888:8888"

  pubsub-emulator:
    image: google/cloud-sdk:emulators
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085
    ports:
      - "8085:8085"

  pubsub-init:
    image: alpine:3.19
    depends_on:
      pubsub-emulator:
        condition: service_started
    volumes:
      - ./scripts:/scripts
    entrypoint: [ "/bin/sh", "/scripts/pubsub-init.sh" ]
    environment:
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085

  camera-probe:
    build: ./services/camera-probe
    depends_on:
      db:
        condition: service_healthy
      pubsub-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/postgres
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      GCP_PROJECT_ID: deepalert-local
      PUBSUB_TOPIC: camera-health-events

  camera-consumer:
    build: ./services/camera-consumer
    depends_on:
      db:
        condition: service_healthy
      pubsub-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/postgres
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      GCP_PROJECT_ID: deepalert-local
      PUBSUB_SUBSCRIPTION: camera-health-events-sub
